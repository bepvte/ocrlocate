name: Windows Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: 62159a45e18f3a9ac0548628dcaf74fcb60c6ff9
          vcpkgJsonGlob: "vcpkg.json"
          runVcpkgInstall: true
        env:
          VCPKG_DEFAULT_TRIPLET: "x64-windows-static"
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
      
      - name: Build
        run: cargo build --release --locked --features bundled
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      
      - name: Download language data
        run: |
          mkdir tessdata
          $baseUrl = "https://github.com/tesseract-ocr/tessdata/raw/main"
          @("eng", "osd") | ForEach-Object {
            Invoke-WebRequest -Uri "$baseUrl/$_.traineddata" -OutFile "tessdata/$_.traineddata"
          }
      
      - name: Package
        run: |
          $packageDir = "ocrlocate"
          mkdir $packageDir
          Copy-Item "target\release\ocrlocate.exe" $packageDir
          Copy-Item "tessdata" "$packageDir\tessdata" -Recurse
          Compress-Archive -Path $packageDir -DestinationPath "ocrlocate-x86_64-pc-windows-msvc.zip"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ocrlocate-windows
          path: ocrlocate-x86_64-pc-windows-msvc.zip
      
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: ocrlocate-x86_64-pc-windows-msvc.zip
